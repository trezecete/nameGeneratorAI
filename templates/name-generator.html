<form class="name-generator-form">
    <div class="form-group">
        <label for="ng-race">Race / Species</label>
        <div class="form-fields">
            <input type="text" id="ng-race" name="race" placeholder="e.g., Elf, Dwarf, Human" required>
        </div>
    </div>
    
    <div class="form-group">
        <label for="ng-culture">Culture / Background</label>
        <div class="form-fields">
            <input type="text" id="ng-culture" name="culture" placeholder="e.g., Highborn, Viking, Cyberpunk" required>
        </div>
    </div>

    <div class="form-group">
        <button type="button" id="generate-btn">
            <i class="fas fa-dice"></i> Generate Names
        </button>
    </div>

    {{#if names}}
    <div class="generated-names">
        <h3>Generated Names</h3>
        <ul class="name-list">
            {{#each names}}
            <li>
                <span class="generated-name">{{this}}</span>
                <a class="copy-name" title="Copy to clipboard" data-name="{{this}}"><i class="fas fa-copy"></i></a>
            </li>
            {{/each}}
        </ul>
    </div>
    {{/if}}
</form>
