<form class="name-generator-form">
    <div class="form-group">
        <label for="ng-race">Race / Species</label>
        <div class="form-fields">
            <select id="ng-race" name="race">
                {{#each races}}
                <option value="{{@key}}">{{this.label}}</option>
                {{/each}}
            </select>
        </div>
        <p id="ng-race-description" class="notes"></p>
    </div>

    <div class="form-group" id="ng-custom-race-group" style="display: none;">
        <label for="ng-custom-race">Custom Race Name</label>
        <div class="form-fields">
            <input type="text" id="ng-custom-race" name="customRace" placeholder="e.g., Tabaxi, Plasmoid">
        </div>
    </div>

    <div class="form-group">
        <label for="ng-gender">Gender / Presentation</label>
        <div class="form-fields">
            <select id="ng-gender" name="gender">
                <option value="any">Any / Random</option>
                <option value="male">Masculine / Male</option>
                <option value="female">Feminine / Female</option>
                <option value="neutral">Androgynous / Neutral</option>
            </select>
        </div>
    </div>

    <div class="form-group">
        <label for="ng-class">Class / Profession (Optional)</label>
        <div class="form-fields">
            <input type="text" id="ng-class" name="class" placeholder="e.g., Wizard, Fighter, Peasant">
        </div>
    </div>

    <div class="form-group">
        <label for="ng-culture">Culture / Background (Optional)</label>
        <div class="form-fields">
            <input type="text" id="ng-culture" name="culture" placeholder="e.g., Highborn, Viking, Cyberpunk">
        </div>
    </div>

    <div class="form-group">
        <button type="button" id="generate-btn">
            <i class="fas fa-dice"></i> Generate Names
        </button>
    </div>

    {{#if names}}
    <div class="generated-names">
        <h3>Generated Names</h3>
        <ul class="name-list">
            {{#each names}}
            <li>
                <span class="generated-name">{{this}}</span>
                <a class="copy-name" title="Copy to clipboard" data-name="{{this}}"><i class="fas fa-copy"></i></a>
            </li>
            {{/each}}
        </ul>
    </div>
    {{/if}}
</form>
