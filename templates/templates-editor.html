<form class="templates-editor-form">
    <div class="templates-list">
        {{#each templates}}
        <div class="template-item" data-id="{{@key}}">
            <div class="item-header">
                <input type="text" name="templates.{{@key}}.label" value="{{this.label}}" placeholder="Race Name">
                <a class="delete-template" title="Delete Template"><i class="fas fa-trash"></i></a>
            </div>
            <div class="item-body">
                <div class="field-item">
                    <label>UI Description:</label>
                    <textarea name="templates.{{@key}}.description"
                        placeholder="Description shown to players">{{this.description}}</textarea>
                </div>
                <div class="field-item">
                    <label>Word Categories (Separated by comma):</label>
                    <input type="text" name="templates.{{@key}}.categories" value="{{this.categories}}" 
                        placeholder="e.g. Nature, Magic, Star, Forest">
                </div>
                <div class="field-item">
                    <label>Base Languages (Separated by comma):</label>
                    <input type="text" name="templates.{{@key}}.languages" value="{{this.languages}}" 
                        placeholder="e.g. French, Latin, Welsh">
                </div>
                <div class="field-item">
                    <label>Sonority / Name Style:</label>
                    <textarea name="templates.{{@key}}.sonority"
                        placeholder="e.g. Melodic, soft, flowing... avoiding hard consonants.">{{this.sonority}}</textarea>
                </div>
            </div>
        </div>
        {{/each}}
    </div>

    <div class="form-group">
        <button type="button" id="add-template">
            <i class="fas fa-plus"></i> Add New Race Template
        </button>
    </div>

    <footer class="sheet-footer">
        <button type="submit" name="submit">
            <i class="fas fa-save"></i> Save All Templates
        </button>
        <button type="button" id="reset-templates">
            <i class="fas fa-undo"></i> Reset to Defaults
        </button>
    </footer>
</form>
